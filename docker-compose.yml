version: "3.9"
services:
  db:
    image: postgres:16
    container_name: sc_manager_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sc_manager
    ports:
      - "5432:5432"
    volumes:
      - sc_manager_pg:/var/lib/postgresql/data
volumes:
  sc_manager_pg:
